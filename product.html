<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — VELNOVA</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
<div id="nav-ph"></div>
<section class="section" style="padding-top:calc(68px + 40px);">
  <div class="container">
    <div class="breadcrumb" style="margin-bottom:32px;">
      <a href="index.html">Home</a><span>/</span>
      <a href="shop.html">Shop</a><span>/</span>
      <span id="pd-bc">Product</span>
    </div>
    <div class="pd-layout">
      <div class="pd-sticky">
        <div class="pd-main-img-wrap">
          <img id="pd-main-img" src="" alt="Product">
        </div>
        <div class="pd-thumbs" id="pd-thumbs" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
      </div>
      <div>
        <div class="pd-cat" id="pd-cat"></div>
        <h1 class="pd-name" id="pd-name">Loading...</h1>
        <div class="pd-price" id="pd-price"></div>
        <p class="pd-desc" id="pd-desc"></p>
        <hr class="pd-divider">
        <div class="pd-label">Select Size</div>
        <div class="pd-sizes" id="pd-sizes"></div>
        <hr class="pd-divider">
        <div class="qty-row">
          <div class="qty-ctrl">
            <button class="qty-btn" id="qty-minus">&#8722;</button>
            <div class="qty-num" id="qty-num">1</div>
            <button class="qty-btn" id="qty-plus">+</button>
          </div>
          <button class="btn btn-dark btn-lg" id="add-cart-btn" style="flex:1;">
            Add to Cart
          </button>
        </div>
        <a href="cart.html" class="btn btn-outline btn-full" style="margin-bottom:20px;">View Cart</a>
        <hr class="pd-divider">
        <div style="display:flex;flex-direction:column;gap:9px;">
          <div style="display:flex;gap:10px;align-items:center;font-size:0.82rem;color:#5a5a58;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>
            Free delivery on orders above &#8358;50,000
          </div>
          <div style="display:flex;gap:10px;align-items:center;font-size:0.82rem;color:#5a5a58;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>
            Bank transfer payment
          </div>
          <div style="display:flex;gap:10px;align-items:center;font-size:0.82rem;color:#5a5a58;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12l5 5L20 7"/></svg>
            velnovaclothing@gmail.com
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<div id="footer-ph"></div>
<script src="js/layout.js"></script>
<script src="js/script.js"></script>
</body>
</html>
