<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — VELNOVA</title>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
<div id="nav-ph"></div>
<div class="page-hdr">
  <div class="page-hdr-inner">
    <div style="font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:#9a9a98;margin-bottom:8px;">All Products</div>
    <h1 class="page-title">Shop</h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><span>Shop</span></div>
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="shop-layout">
      <aside>
        <div style="margin-bottom:28px;">
          <div class="sidebar-title">Category</div>
          <button class="filter-btn active" data-cat="all"><span class="filter-dot"></span>All Items</button>
          <button class="filter-btn" data-cat="men"><span class="filter-dot"></span>Men</button>
          <button class="filter-btn" data-cat="women"><span class="filter-dot"></span>Women</button>
        </div>
      </aside>
      <div>
        <div class="shop-top">
          <div class="shop-count" id="prod-count">Loading...</div>
        </div>
        <div class="prod-grid prod-grid-3" id="shop-grid">
          <p style="grid-column:1/-1;color:#9a9a98;padding:20px;">Loading products...</p>
        </div>
      </div>
    </div>
  </div>
</section>
<div id="footer-ph"></div>
<script src="js/layout.js"></script>
<script src="js/script.js"></script>
</body>
</html>
